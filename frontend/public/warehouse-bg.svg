<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#05070D"/>
      <stop offset="32%" stop-color="#0A1024"/>
      <stop offset="56%" stop-color="#241A3A"/>
      <stop offset="72%" stop-color="#5B3A5A"/>
      <stop offset="85%" stop-color="#A85A48"/>
      <stop offset="94%" stop-color="#E9915A"/>
      <stop offset="100%" stop-color="#F4B36A"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F8FAFC" stop-opacity="0.95"/>
      <stop offset="18%" stop-color="#DCE6F5" stop-opacity="0.6"/>
      <stop offset="45%" stop-color="#8FA6C8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#8FA6C8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="moon" cx="42%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="70%" stop-color="#EAF0FA"/>
      <stop offset="100%" stop-color="#C4D2E8"/>
    </radialGradient>
    <radialGradient id="sunGlow" cx="50%" cy="100%" r="70%">
      <stop offset="0%" stop-color="#FFC989" stop-opacity="0.55"/>
      <stop offset="45%" stop-color="#E9915A" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#E9915A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="whBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D1424"/>
      <stop offset="100%" stop-color="#060A14"/>
    </linearGradient>
    <linearGradient id="whRoof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#182238"/>
      <stop offset="100%" stop-color="#0D1424"/>
    </linearGradient>
    <linearGradient id="win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE3B0"/>
      <stop offset="100%" stop-color="#F5A85C"/>
    </linearGradient>
    <linearGradient id="reflection" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F4B36A" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#0A1024" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="9"/></filter>
    <filter id="cloudBlur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="22"/></filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#sky)"/>
  <rect x="0" y="640" width="1920" height="440" fill="url(#sunGlow)"/>

  <!-- Stars -->
  <g fill="#FFFFFF">
    <circle cx="180" cy="120" r="1.6" opacity="0.8"/><circle cx="420" cy="80" r="1.2" opacity="0.6"/>
    <circle cx="640" cy="160" r="1.4" opacity="0.7"/><circle cx="880" cy="70" r="1.1" opacity="0.5"/>
    <circle cx="1120" cy="140" r="1.5" opacity="0.7"/><circle cx="1340" cy="90" r="1.2" opacity="0.6"/>
    <circle cx="1560" cy="180" r="1.6" opacity="0.8"/><circle cx="1760" cy="110" r="1.3" opacity="0.6"/>
    <circle cx="300" cy="240" r="1.1" opacity="0.5"/><circle cx="980" cy="260" r="1.3" opacity="0.6"/>
    <circle cx="1460" cy="300" r="1.2" opacity="0.5"/>
  </g>

  <!-- Moon -->
  <circle cx="1480" cy="250" r="260" fill="url(#moonGlow)"/>
  <circle cx="1480" cy="250" r="86" fill="url(#moon)"/>
  <circle cx="1452" cy="228" r="14" fill="#C4D2E8" opacity="0.35"/>
  <circle cx="1510" cy="270" r="10" fill="#C4D2E8" opacity="0.30"/>
  <circle cx="1494" cy="222" r="7" fill="#C4D2E8" opacity="0.28"/>

  <!-- Clouds -->
  <g filter="url(#cloudBlur)" opacity="0.5">
    <ellipse cx="520" cy="360" rx="360" ry="46" fill="#3A2F4E"/>
    <ellipse cx="1180" cy="440" rx="440" ry="52" fill="#6A4356"/>
    <ellipse cx="300" cy="520" rx="300" ry="44" fill="#8A5750"/>
    <ellipse cx="1600" cy="560" rx="360" ry="48" fill="#B5714E"/>
  </g>

  <!-- Distant skyline -->
  <g fill="#0A0E1A" opacity="0.9">
    <rect x="0" y="620" width="120" height="180"/><rect x="140" y="660" width="90" height="140"/>
    <rect x="1700" y="600" width="140" height="200"/><rect x="1600" y="660" width="80" height="140"/>
  </g>

  <!-- Gantry crane (logistics) -->
  <g stroke="#111A2C" stroke-width="10" fill="none" opacity="0.95">
    <line x1="1690" y1="470" x2="1690" y2="700"/>
    <line x1="1850" y1="470" x2="1850" y2="700"/>
    <line x1="1660" y1="475" x2="1880" y2="475"/>
    <line x1="1770" y1="475" x2="1770" y2="560"/>
  </g>
  <rect x="1748" y="560" width="44" height="34" fill="#F5A85C" opacity="0.85"/>

  <!-- Warehouse complex -->
  <g>
    <rect x="120" y="700" width="360" height="240" fill="url(#whBody)"/>
    <polygon points="120,700 300,650 480,700" fill="url(#whRoof)"/>
    <rect x="470" y="640" width="640" height="300" fill="url(#whBody)"/>
    <polygon points="470,640 790,570 1110,640" fill="url(#whRoof)"/>
    <rect x="1100" y="690" width="520" height="250" fill="url(#whBody)"/>
    <polygon points="1100,690 1360,645 1620,690" fill="url(#whRoof)"/>

    <!-- Warm lit bays / windows -->
    <g fill="url(#win)" opacity="0.92">
      <rect x="520" y="760" width="70" height="120" rx="4"/><rect x="620" y="760" width="70" height="120" rx="4"/>
      <rect x="720" y="760" width="70" height="120" rx="4"/><rect x="820" y="760" width="70" height="120" rx="4"/>
      <rect x="920" y="760" width="70" height="120" rx="4"/><rect x="1020" y="760" width="70" height="120" rx="4"/>
      <rect x="160" y="760" width="52" height="70" rx="3"/><rect x="232" y="760" width="52" height="70" rx="3"/>
      <rect x="304" y="760" width="52" height="70" rx="3"/><rect x="376" y="760" width="52" height="70" rx="3"/>
      <rect x="1140" y="760" width="60" height="90" rx="3"/><rect x="1224" y="760" width="60" height="90" rx="3"/>
      <rect x="1308" y="760" width="60" height="90" rx="3"/><rect x="1392" y="760" width="60" height="90" rx="3"/>
      <rect x="1476" y="760" width="60" height="90" rx="3"/>
    </g>

    <!-- Roof edge accent lighting -->
    <g stroke="#F5A85C" stroke-width="2.5" opacity="0.5">
      <line x1="470" y1="641" x2="1110" y2="641"/><line x1="120" y1="701" x2="480" y2="701"/>
      <line x1="1100" y1="691" x2="1620" y2="691"/>
    </g>
  </g>

  <!-- Stacked shipping containers -->
  <g opacity="0.95">
    <rect x="60" y="852" width="150" height="46" rx="3" fill="#B5714E"/>
    <rect x="60" y="898" width="150" height="46" rx="3" fill="#8A5750"/>
    <rect x="216" y="878" width="150" height="46" rx="3" fill="#4F6A8A"/>
    <rect x="216" y="924" width="150" height="20" rx="3" fill="#3A526E"/>
    <rect x="1636" y="864" width="150" height="46" rx="3" fill="#6A4356"/>
    <rect x="1636" y="910" width="150" height="34" rx="3" fill="#4F6A8A"/>
    <g stroke="#05070D" stroke-width="2" opacity="0.5">
      <line x1="110" y1="852" x2="110" y2="944"/><line x1="160" y1="852" x2="160" y2="944"/>
      <line x1="266" y1="878" x2="266" y2="944"/><line x1="316" y1="878" x2="316" y2="944"/>
      <line x1="1686" y1="864" x2="1686" y2="944"/><line x1="1736" y1="864" x2="1736" y2="944"/>
    </g>
  </g>

  <!-- Parked delivery trucks silhouettes -->
  <g fill="#0A101E" opacity="0.95">
    <rect x="1160" y="884" width="150" height="56" rx="4"/>
    <rect x="1300" y="898" width="60" height="42" rx="4"/>
    <circle cx="1195" cy="946" r="10" fill="#05070D"/><circle cx="1280" cy="946" r="10" fill="#05070D"/>
    <circle cx="1335" cy="946" r="10" fill="#05070D"/>
    <rect x="1348" y="906" width="10" height="10" fill="#FFE3B0" opacity="0.8"/>
  </g>

  <!-- Ground + reflections -->
  <rect x="0" y="940" width="1920" height="140" fill="#060A12"/>
  <rect x="120" y="940" width="1500" height="120" fill="url(#reflection)" filter="url(#soft)"/>
  <g fill="#F5A85C" opacity="0.16" filter="url(#soft)">
    <rect x="520" y="945" width="70" height="90"/><rect x="720" y="945" width="70" height="90"/>
    <rect x="920" y="945" width="70" height="90"/><rect x="1224" y="945" width="60" height="80"/>
    <rect x="1392" y="945" width="60" height="80"/>
  </g>
</svg>
